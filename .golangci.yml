run:
  timeout: 5m
  go: "1.22"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - revive
    - gosec
    - gofmt
    - goimports
    - misspell
    - unconvert
    - prealloc
    - copyloopvar
    - bodyclose
    - noctx
    - nilerr

linters-settings:
  revive:
    rules:
      - name: exported
        arguments:
          - "checkPrivateReceivers"
      - name: unused-parameter
      - name: unreachable-code
      - name: context-as-argument
      - name: error-return
      - name: error-strings
      - name: var-naming
  gosec:
    excludes:
      - G101 # hardcoded credentials (we handle tokens)
      - G404 # weak random (not crypto context)

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
  max-issues-per-linter: 50
  max-same-issues: 10
