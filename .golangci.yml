version: "2"

run:
  go: "1.25"

linters:
  enable:
    - bodyclose
    - copyloopvar
    - gosec
    - misspell
    - nilerr
    - noctx
    - prealloc
    - revive
    - unconvert
  settings:
    gosec:
      excludes:
        - G101
        - G104
        - G115
        - G301
        - G304
        - G404
        - G117
    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
        - name: unused-parameter
        - name: unreachable-code
        - name: context-as-argument
        - name: error-return
        - name: error-strings
        - name: var-naming
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gosec
        path: _test\.go
      - linters:
          - revive
        path: frontend/node_modules/
      - linters:
          - staticcheck
        text: "QF1011:"
      - linters:
          - staticcheck
        text: "ST1023:"
    paths:
      - third_party$
      - builtin$
      - examples$

issues:
  max-issues-per-linter: 50
  max-same-issues: 10

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
